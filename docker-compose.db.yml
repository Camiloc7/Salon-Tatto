services:
  postgres:
    image: postgres:16-alpine
    container_name: salon-postgres-db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-salon_tatto}
      POSTGRES_USER: ${DATABASE_USER:-app}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-change_me_in_production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-app} -d ${DATABASE_NAME:-salon_tatto}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
