name: Deploy to VPS (Zero Downtime)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy and Healthcheck via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            TIMESTAMP=$(date +%s)
            DEPLOY_DIR="/home/camilo/Salon-Tatto-${TIMESTAMP}"
            CURRENT_DIR="/home/camilo/Salon-Tatto"
            BACKUP_DIR="/home/camilo/Salon-Tatto-Backup"

            echo "=== 1. CLONANDO EN NUEVO ENTORNO (Carpeta Fantasma) ==="
            git clone https://github.com/Camiloc7/Salon-Tatto.git $DEPLOY_DIR
            cd $DEPLOY_DIR
            
            echo "=== 2. ENLAZANDO VARIABLES DE ENTORNO ==="
            # Copiar el .env desde el directorio de producción actual ANTES de compilar
            cp $CURRENT_DIR/.env $DEPLOY_DIR/.env
            # Y también copiarlo a la carpeta de Next.js para que las variables NEXT_PUBLIC_ funcionen en el build
            cp $CURRENT_DIR/.env $DEPLOY_DIR/apps/web/.env
            
            echo "=== 3. INSTALANDO Y COMPILANDO EN VPS ==="
            npm install
            npm run build
            
            echo "=== 4. EJECUTANDO SWAP DE CARPETAS (Zero Downtime) ==="
            cd /home/camilo
            rm -rf $BACKUP_DIR
            # Renombrar actual a backup y nueva a actual de forma ultra rápida
            mv $CURRENT_DIR $BACKUP_DIR
            mv $DEPLOY_DIR $CURRENT_DIR
            
            echo "=== 4.5. EJECUTANDO MIGRACIONES DE BASE DE DATOS ==="
            cd $CURRENT_DIR
            npm run db:migration:run
            
            echo "=== 5. REINICIANDO PM2 ==="
            cd $CURRENT_DIR
            pm2 reload ecosystem.config.js --env production
            
            echo "=== 6. VERIFICANDO HEALTHCHECK ==="
            # Esperar 15 segundos para que NestJS levante
            sleep 15
            
            # Chequear endpoint
            HEALTH_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:4000/api/health || echo "FAILED")
            
            if [ "$HEALTH_STATUS" = "200" ]; then
              echo "✅ Despliegue exitoso. La API está saludable (Status: $HEALTH_STATUS)."
              pm2 save
            else
              echo "❌ ERROR FATAL: El Healthcheck falló (Status: $HEALTH_STATUS)."
              echo "⚠️ INICIANDO ROLLBACK AUTOMÁTICO..."
              
              cd /home/camilo
              # Restaurar backup
              rm -rf $CURRENT_DIR
              mv $BACKUP_DIR $CURRENT_DIR
              
              cd $CURRENT_DIR
              pm2 reload ecosystem.config.js --env production
              
              echo "⛔ Rollback completado. El servidor viejo ha sido restaurado."
              exit 1
            fi
