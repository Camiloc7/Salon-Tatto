services:
  postgres:
    image: postgres:16-alpine
    container_name: salon-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-salon_tatto}
      POSTGRES_USER: ${DATABASE_USER:-app}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-change_me_in_production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-app} -d ${DATABASE_NAME:-salon_tatto}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./salon-tatto
      dockerfile: apps/api/Dockerfile
    container_name: salon-api
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${DATABASE_NAME:-salon_tatto}
      DATABASE_USER: ${DATABASE_USER:-app}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-change_me_in_production}
      JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-key-change-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-super-secret-refresh-key-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-900}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-604800}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-your_cloud_name}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-your_api_key}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-your_api_secret}
      API_PORT: 4000
      API_URL: ${API_URL:-http://localhost:4000}
      WEB_URL: ${WEB_URL:-http://localhost:3000}
      THROTTLE_TTL: ${THROTTLE_TTL:-60}
      THROTTLE_LIMIT: ${THROTTLE_LIMIT:-100}
    volumes:
      - ./salon-tatto/apps/api/src:/app/apps/api/src
      - ./salon-tatto/packages:/app/packages

  web:
    build:
      context: ./salon-tatto
      dockerfile: apps/web/Dockerfile
    container_name: salon-web
    ports:
      - "3000:3000"
    depends_on:
      - api
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
      NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: ${NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME:-your_cloud_name}
      DEFAULT_LOCALE: ${DEFAULT_LOCALE:-en}
    volumes:
      - ./salon-tatto/apps/web/src:/app/apps/web/src
      - ./salon-tatto/apps/web/public:/app/apps/web/public
      - ./salon-tatto/packages:/app/packages

  nginx:
    image: nginx:alpine
    container_name: salon-nginx
    ports:
      - "80:80"
    depends_on:
      - web
      - api
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    environment:
      NGINX_HOST: ${NGINX_HOST:-localhost}

volumes:
  postgres_data:
