# Configuración para el VPS (Nginx Reverse Proxy)

# Opcional: Redirigir HTTP a HTTPS (Si usas SSL con Certbot)
server {
    listen 80;
    server_name tu-dominio.com www.tu-dominio.com api.tu-dominio.com;
    
    # Descomenta esto después de configurar SSL (Certbot lo hará por ti normalmente)
    # return 301 https://$host$request_uri;
}

# Configuración del Frontend (Next.js)
server {
    # listen 443 ssl; # Descomentar para HTTPS
    listen 80; # Borrar si activas HTTPS en la línea superior
    server_name tu-dominio.com www.tu-dominio.com;

    # Rutas SSL (Certbot las agregará)
    # ssl_certificate /etc/letsencrypt/live/tu-dominio.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/tu-dominio.com/privkey.pem;

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Opcional: Configuración para los logs
        # access_log /var/log/nginx/front-access.log;
        # error_log /var/log/nginx/front-error.log;
    }
}

# Configuración del Backend (NestJS API)
server {
    # listen 443 ssl; # Descomentar para HTTPS
    listen 80; # Borrar si activas HTTPS en la línea superior
    server_name api.tu-dominio.com;

    # Rutas SSL (Certbot las agregará)
    # ssl_certificate /etc/letsencrypt/live/api.tu-dominio.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.tu-dominio.com/privkey.pem;

    location / {
        proxy_pass http://localhost:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;

        # Habilitar CORS en Nginx (Opcional, si NestJS no lo maneja por completo)
        add_header 'Access-Control-Allow-Origin' '*';
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE';
        add_header 'Access-Control-Allow-Headers' 'X-Requested-With,Accept,Content-Type, Origin';
    }
}
